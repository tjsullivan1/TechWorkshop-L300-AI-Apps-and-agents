name: Run Cart Manager Agent Initializer

on:
  push:
    branches: [main]
    paths:
      - 'src/app/agents/cartManagerAgent_initializer.py'
      - 'src/prompts/CartManager.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/app/agents/cartManagerAgent_initializer.py'
      - 'src/prompts/CartManager.txt'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  run-cart-manager-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Write .env file
        run: |
          echo "${{ secrets.ENV }}" > src/.env

      - name: Run Cart Manager Agent Initializer
        working-directory: src
        run: |
          python -m app.agents.cartManagerAgent_initializer
