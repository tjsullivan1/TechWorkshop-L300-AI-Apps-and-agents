name: Run Customer Loyalty Agent Initializer

on:
  push:
    branches: [main]
    paths:
      - 'src/app/agents/customerLoyaltyAgent_initializer.py'
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/app/tools/discountLogic.py'
      - '.github/workflows/run-customer-loyalty-agent.yml'

  pull_request:
    branches: [main]
    paths:
      - 'src/app/agents/customerLoyaltyAgent_initializer.py'
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/app/tools/discountLogic.py'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  run-loyalty-agent:
    runs-on: ubuntu-latest
    env:
        ENV: ${{ secrets.ENV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Write .env file
        run: |
          echo "${{ secrets.ENV }}" > src/.env

      - name: Run Customer Loyalty Agent Initializer
        run: |
          cd src/
          python app/agents/customerLoyaltyAgent_initializer.py
