name: Run Shopper Agent Initializer

on:
  push:
    branches: [main]
    paths:
      - 'src/app/agents/shopperAgent_initializer.py'
      - 'src/prompts/ShopperAgentPrompt.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/app/agents/shopperAgent_initializer.py'
      - 'src/prompts/ShopperAgentPrompt.txt'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  run-shopper-agent:
    runs-on: ubuntu-latest
    env:
        ENV: ${{ secrets.ENV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Write .env file
        run: |
          echo "${{ secrets.ENV }}" > src/.env

      - name: Export multi-line ENV secrets
        run: |
          echo "$ENV" > .env
          set -a
          source .env
          set +a
          # Now all variables from ENV are available as environment variables
          
      - name: Print COSMOS_ENDPOINT
        run: echo $COSMOS_ENDPOINT

      - name: Run Shopper Agent Initializer
        working-directory: src
        run: |
          python -m app.agents.shopperAgent_initializer
